<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentic AI ROI Toolkit | Paula Silva</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024'%3E%3Cg transform='translate(16,233) scale(0.62)'%3E%3Cpath d='M528 200 L300 385 L528 565' fill='none' stroke='%23FF3133' stroke-width='112' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='518' y='455' width='136' height='136' rx='30' fill='%237ED956'/%3E%3Cline x1='855' y1='150' x2='692' y2='610' stroke='%23FFDE59' stroke-width='112' stroke-linecap='round'/%3E%3Cpath d='M975 200 L1203 385 L975 565' fill='none' stroke='%2339B8FF' stroke-width='112' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/g%3E%3C/svg%3E"><rect x="0" y="0" width="8" height="8" fill="%23F25022"/><rect x="9" y="0" width="8" height="8" fill="%237FBA00"/><rect x="0" y="9" width="8" height="8" fill="%2300A4EF"/><rect x="9" y="9" width="8" height="8" fill="%23FFB900"/></svg>'>
<style>
/* ── Reset & Tokens ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:15px}
:root{
  --c-blue:#0078D4;--c-green:#107C10;--c-yellow:#D19200;--c-red:#D13438;--c-purple:#7B52AB;--c-teal:#00B294;--c-orange:#C55A11;
  --bg-page:#F0EEE9;--bg-card:#FFFFFF;--border:#E1DFDD;--border-light:#EDEBE9;
  --text-primary:#161514;--text-secondary:#484644;--text-muted:#8A8886;--text-subtle:#B0ADAB;
  --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.05);
  --shadow-md:0 2px 6px rgba(0,0,0,.07),0 6px 20px rgba(0,0,0,.07);
  --shadow-lg:0 4px 16px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.1);
  --shadow-blue:0 4px 24px rgba(0,120,212,.18);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --transition:all .18s cubic-bezier(.4,0,.2,1);
}
body{font-family:"Inter","Segoe UI Variable","Segoe UI",-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;background:var(--bg-page);color:var(--text-primary);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C8C6C4;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#A19F9D}

/* ── Form elements ── */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:#E1DFDD;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--c-blue);border:2.5px solid #fff;box-shadow:0 1px 6px rgba(0,120,212,.5);cursor:pointer;transition:transform .15s,box-shadow .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:0 2px 10px rgba(0,120,212,.6)}
input[type=number],input[type=text],select{font-family:inherit;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;background:#fff;outline:none;width:100%;color:var(--text-primary);transition:var(--transition);height:34px}
input[type=number]:focus,input[type=text]:focus,select:focus{border-color:var(--c-blue);box-shadow:0 0 0 3px rgba(0,120,212,.12)}
input[type=number]:hover,input[type=text]:hover,select:hover{border-color:#B0ADAB}
button{font-family:inherit;cursor:pointer}

/* ── Top color bar ── */
.topbar{height:3px;background:linear-gradient(to right,#F25022 0%,#F25022 25%,#7FBA00 25%,#7FBA00 50%,#00A4EF 50%,#00A4EF 75%,#FFB900 75%,#FFB900 100%)}

/* ── Header ── */
.hdr{
  background:linear-gradient(160deg,#050D1A 0%,#002F5F 35%,#005A9E 65%,#003D73 100%);
  padding:28px 40px 0;color:#fff;
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.hdr::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(0,120,212,.18),transparent);pointer-events:none}
.hdr-inner{max-width:1320px;margin:0 auto;position:relative}
.hdr-brand{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:12px}
.dots{display:flex;gap:4px}.dot{width:9px;height:9px;border-radius:2.5px}
.hdr h1{font-size:28px;font-weight:800;margin-bottom:4px;letter-spacing:-.5px;line-height:1.15}
.hdr p{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:20px;line-height:1.55;max-width:700px}
.main-tabs{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.08);overflow-x:auto;margin-top:4px}
.main-tab{padding:13px 24px;font-size:13px;font-weight:600;color:rgba(255,255,255,.45);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:var(--transition);white-space:nowrap;letter-spacing:.01em}
.main-tab:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.main-tab.on{color:#fff;border-bottom-color:#FFB900;background:rgba(255,255,255,.07)}

/* ── Main wrap ── */
.wrap{max-width:1320px;margin:0 auto;padding:28px 32px 80px}

/* ── Sub-tabs (pill) ── */
.sub-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{padding:7px 20px;font-size:12px;font-weight:600;border-radius:100px;border:1.5px solid var(--border);background:#fff;color:var(--text-secondary);cursor:pointer;transition:var(--transition)}
.sub-tab.on{background:var(--c-blue);color:#fff;border-color:var(--c-blue);box-shadow:0 2px 8px rgba(0,120,212,.25)}
.sub-tab:hover:not(.on){background:#EFF6FC;color:var(--c-blue);border-color:#C7E0F4}

/* ── Hero band ── */
.hero-band{
  background:linear-gradient(135deg,#050D1A 0%,#003D73 40%,#0078D4 100%);
  border-radius:var(--radius-lg);padding:24px 32px;color:#fff;
  margin-bottom:20px;box-shadow:var(--shadow-blue);
  position:relative;overflow:hidden;
}
.hero-band::after{content:"";position:absolute;top:-30%;right:-5%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%);pointer-events:none}
.hb-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
@media(max-width:800px){.hb-inner{grid-template-columns:1fr 1fr}}
.hb-cell{text-align:center;padding:10px 16px;border-right:1px solid rgba(255,255,255,.10)}
.hb-cell:last-child{border-right:none}
.hb-lbl{font-size:9.5px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600}
.hb-val{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1.5px}
.hb-val .u{font-size:17px;font-weight:400;letter-spacing:0}
.hb-sub{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:4px}
.hb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.hb-title{font-size:14px;font-weight:700;letter-spacing:-.1px}
.r-badge{font-size:11px;font-weight:700;border-radius:100px;padding:4px 14px;letter-spacing:.02em}

/* ── KPI grid ── */
.ov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
@media(max-width:1000px){.ov-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.ov-grid{grid-template-columns:1fr}}

/* ── Stat cards ── */
.stat-card{
  background:#fff;border:1px solid var(--border-light);
  border-radius:var(--radius-lg);padding:22px 24px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3.5px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.stat-card.c-blue::before{background:linear-gradient(90deg,#0078D4,#2B88D8)}
.stat-card.c-green::before{background:linear-gradient(90deg,#107C10,#40A340)}
.stat-card.c-yellow::before{background:linear-gradient(90deg,#D19200,#FFBA00)}
.stat-card.c-red::before{background:linear-gradient(90deg,#D13438,#E84848)}
.stat-card.c-purple::before{background:linear-gradient(90deg,#7B52AB,#9B72CB)}
.stat-card.c-teal::before{background:linear-gradient(90deg,#00B294,#00CCB0)}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:10px}
.stat-num{font-size:40px;font-weight:800;line-height:1;letter-spacing:-1.5px;margin-bottom:5px}
.stat-card.c-blue .stat-num{color:#0078D4}.stat-card.c-green .stat-num{color:#107C10}
.stat-card.c-yellow .stat-num{color:#7A5700}.stat-card.c-red .stat-num{color:#D13438}
.stat-card.c-purple .stat-num{color:#6B3FA0}.stat-card.c-teal .stat-num{color:#006B5A}
.stat-sub{font-size:12px;color:var(--text-muted);line-height:1.45}
.stat-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:100px;padding:2px 9px;margin-top:7px}

/* ── Cards ── */
.card{
  background:#fff;border:1px solid var(--border-light);
  border-radius:var(--radius-lg);padding:22px 26px;
  margin-bottom:18px;box-shadow:var(--shadow-sm);
}
.card h3{font-size:14.5px;font-weight:700;color:var(--text-primary);margin-bottom:4px;letter-spacing:-.1px}
.sec-sub{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.55}
.sec-hdr{font-size:14.5px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.card h4{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;margin-top:16px}

/* ── Bars ── */
.bar-row{margin-bottom:12px}.bar-row:last-child{margin-bottom:0}
.bar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.bar-lbl{font-size:12.5px;color:var(--text-secondary)}.bar-pct{font-size:10px;color:var(--text-subtle);margin-left:4px}
.bar-val{font-size:13px;font-weight:700;color:var(--text-primary)}
.bar-track{height:8px;background:#F0EFEE;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── Two-col layout ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl thead{position:sticky;top:0;z-index:1}
.tbl th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.55px;color:var(--text-muted);padding:9px 12px 7px;border-bottom:2px solid var(--border);background:#FAFAF9;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);vertical-align:middle;line-height:1.4}
.tbl tbody tr:hover td{background:#F5F9FE}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.hi td{background:#EFF6FC}
.tbl .g{color:var(--c-green);font-weight:700}.tbl .m{color:var(--text-muted)}.tbl .b{color:var(--c-blue);font-weight:700}

/* ── Notes ── */
.note{font-size:11.5px;color:var(--text-secondary);line-height:1.55;padding:10px 14px;background:#FAF9F8;border-radius:var(--radius-sm);border-left:3px solid var(--border)}
.note.warn{border-left-color:var(--c-yellow);background:#FFFBF0}
.note.err{border-left-color:var(--c-red);background:#FDF3F4}
.note.info{border-left-color:var(--c-blue);background:#EFF6FC}

/* ── Pills ── */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{font-size:11.5px;color:var(--text-secondary);background:#F3F2F1;border:1px solid var(--border);border-radius:100px;padding:4px 12px;transition:var(--transition)}
.pill strong{color:var(--text-primary);font-weight:700}
.pill:hover{background:#EFF6FC;border-color:#C7E0F4;color:var(--c-blue)}

/* ── Presets ── */
.preset-strip{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.preset-btn{padding:6px 15px;font-size:12px;font-weight:600;border-radius:100px;border:1.5px solid var(--border);background:#F8F7F6;color:var(--text-secondary);cursor:pointer;transition:var(--transition);font-family:inherit}
.preset-btn:hover{border-color:var(--c-blue);background:#EFF6FC;color:var(--c-blue)}
.preset-btn.on{background:var(--c-blue);border-color:var(--c-blue);color:#fff;box-shadow:0 2px 8px rgba(0,120,212,.2)}

/* ── Divider ── */
.divider{height:1px;background:var(--border-light);margin:14px 0}

/* ── Label ── */
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:7px}

/* ── Scenario cards ── */
.sc-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:700px){.sc-strip{grid-template-columns:1fr}}
.sc{border-radius:var(--radius-md);border:1.5px solid;padding:16px 18px}
.sc.best{border-color:#9FD99F;background:#F1FAF1}
.sc.exp{border-color:#C7E0F4;background:#EFF6FC;box-shadow:0 0 0 2px rgba(0,120,212,.12)}
.sc.worst{border-color:var(--border);background:#FAF9F8}
.sc-tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sc.best .sc-tag{color:#107C10}.sc.exp .sc-tag{color:var(--c-blue)}.sc.worst .sc-tag{color:var(--text-muted)}
.sc-roi{font-size:26px;font-weight:800;margin-bottom:2px;letter-spacing:-.5px}
.sc.best .sc-roi{color:#107C10}.sc.exp .sc-roi{color:var(--c-blue)}.sc.worst .sc-roi{color:var(--text-secondary)}
.sc-data{font-size:12px;color:var(--text-muted);line-height:1.65}

/* ── Sliders ── */
.sldr{margin-bottom:14px}.sldr:last-child{margin-bottom:0}
.sldr-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sldr-lbl{font-size:12.5px;color:var(--text-secondary);font-weight:500}
.sldr-val{font-size:12px;font-weight:700;color:var(--text-primary);background:#F3F2F1;border:1px solid var(--border);border-radius:4px;padding:2px 9px;min-width:76px;text-align:right}
.sldr-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--text-subtle);margin-top:4px}

/* ── Persona grid ── */
.persona-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
@media(max-width:1000px){.persona-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:700px){.persona-grid{grid-template-columns:repeat(3,1fr)}}
.persona-btn{border:1.5px solid var(--border);border-radius:var(--radius-md);padding:11px 8px;cursor:pointer;text-align:center;font-family:inherit;background:#fff;transition:var(--transition)}
.persona-btn:hover{border-color:var(--c-blue);background:#EFF6FC;transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.persona-btn.on{border-color:var(--c-blue);background:#EFF6FC;box-shadow:0 0 0 2px rgba(0,120,212,.2)}
.persona-icon{font-size:22px;display:block;margin-bottom:4px}
.persona-name{font-size:10.5px;font-weight:600;color:#323130;line-height:1.25}
.persona-wave{font-size:9px;color:var(--text-muted);margin-top:2px}

/* ── Gartner cards ── */
.gartner-card{
  background:#fff;border:1px solid var(--border-light);
  border-radius:var(--radius-lg);padding:20px 22px;
  margin-bottom:16px;border-left:4px solid var(--c-orange);
  box-shadow:var(--shadow-sm);
}
.gartner-card h3{color:var(--c-orange);margin-bottom:8px;font-size:13.5px;font-weight:700}
.gartner-card .src{font-size:10px;color:var(--text-subtle);margin-top:8px;font-weight:600;letter-spacing:.02em}

/* ── Insight cards ── */
.insight-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:800px){.insight-grid{grid-template-columns:1fr}}
.insight-card{border-radius:var(--radius-lg);padding:20px;text-align:center;border:1.5px solid;transition:var(--transition)}
.insight-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.insight-card .ic-num{font-size:38px;font-weight:800;line-height:1;margin-bottom:5px;letter-spacing:-1px}
.insight-card .ic-lbl{font-size:12px;font-weight:700;margin-bottom:3px}
.insight-card .ic-sub{font-size:10.5px;color:var(--text-muted)}

/* ── BCP (Defend/Extend/Upend) ── */
.bcp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:700px){.bcp-grid{grid-template-columns:1fr}}
.bcp-card{border-radius:var(--radius-lg);padding:18px;border:1.5px solid;text-align:center;transition:var(--transition)}
.bcp-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.bcp-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.bcp-desc{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-bottom:10px}
.bcp-metric{font-size:11.5px;font-weight:700;margin-bottom:4px}

/* ── Terminal ── */
.term{background:#0D1117;border-radius:var(--radius-lg);padding:18px 20px;color:#fff;box-shadow:var(--shadow-md)}
.term-hdr{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.term-dots{display:flex;gap:5px}.term-dot{width:10px;height:10px;border-radius:50%}
.term-title{font-size:10.5px;color:rgba(255,255,255,.28);font-weight:500}
.mono{font-family:"Cascadia Code","JetBrains Mono","Consolas","Courier New",monospace;font-size:11.5px;line-height:2;color:#8B949E}
.mono .acc{color:#58A6FF;font-weight:600}.mono .grn{color:#3FB950}.mono .yel{color:#D29922;font-weight:700}.mono .wht{color:#E6EDF3}.mono .dim{color:#30363D}.mono .sep{color:#21262D;display:block}

/* ── Footer ── */
.footer{background:#fff;border-top:1px solid var(--border-light);padding:14px 40px}
.footer-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-muted);flex-wrap:wrap;gap:8px}
.footer-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--text-secondary);font-size:12px}
.reset-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-secondary);background:#FAF9F8;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;font-family:inherit;transition:var(--transition)}
.reset-btn:hover{background:#EFF6FC;border-color:var(--c-blue);color:var(--c-blue)}

/* ── Wave timeline ── */
.wave-timeline{display:flex;gap:0;margin-bottom:20px;overflow-x:auto}
.wave-item{flex:1;min-width:150px;padding:16px 18px;text-align:center;position:relative}
.wave-item::after{content:"";position:absolute;top:50%;right:0;width:1px;height:55%;transform:translateY(-50%);background:var(--border-light)}
.wave-item:last-child::after{display:none}
.wave-num{font-size:30px;font-weight:800;margin-bottom:5px;letter-spacing:-1px}
.wave-name{font-size:12px;font-weight:700;margin-bottom:2px}
.wave-time{font-size:10.5px;color:var(--text-muted)}
.wave-profiles{font-size:10.5px;color:var(--text-secondary);margin-top:6px;line-height:1.45}

/* ── Callouts ── */
.callout{border-radius:var(--radius-md);padding:14px 18px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start;border:1px solid}
.callout-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.callout-text{flex:1}
.callout-title{font-size:13px;font-weight:700;margin-bottom:4px}
.callout-body{font-size:12px;color:var(--text-secondary);line-height:1.6}
.callout.gartner{background:#FFF8F0;border-color:#F0D4A8}
.callout.warning{background:#FFFBF0;border-color:#FFD875}
.callout.critical{background:#FDF3F4;border-color:#F1A7A9}
</style>
</head>

<div id="root"></div>
