    <title>Agentic AI ROI Calculator · Paula Silva</title>
    <style>
      /* ── Reset & Tokens ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0
      }

      html {
        scroll-behavior: smooth;
        font-size: 15px
      }

      :root {
        /* Canonical MS 4-color palette per paulasilva-ms skill */
        --c-red: #F25022;
        --c-green: #7FBA00;
        --c-blue: #00A4EF;
        --c-yellow: #FFB900;
        --c-red-50: #FFF0EB;
        --c-green-50: #F1F8E3;
        --c-blue-50: #E5F6FD;
        --c-yellow-50: #FFF7E0;
        --c-red-700: #B33816;
        --c-green-700: #5A8500;
        --c-blue-700: #0076AC;
        --c-yellow-700: #B88500;
        --c-purple: #7B52AB;
        --c-teal: #00B294;
        --c-orange: #FFB900;
        --bg-page: #F7F7F5;
        --bg-alt: #ECECE8;
        --bg-card: #FFFFFF;
        --border: #E5E5E0;
        --border-light: #ECECE8;
        --border-2: #CECEC7;
        --text-primary: #1A1A1A;
        --text-secondary: #3A3A3A;
        --text-muted: #737373;
        --text-subtle: #A8A8A4;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, .04), 0 2px 8px rgba(0, 0, 0, .04);
        --shadow-md: 0 2px 6px rgba(0, 0, 0, .06), 0 6px 18px rgba(0, 0, 0, .06);
        --shadow-lg: 0 4px 14px rgba(0, 0, 0, .07), 0 12px 32px rgba(0, 0, 0, .08);
        --shadow-blue: 0 4px 24px rgba(0, 164, 239, .15);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --transition: all .18s cubic-bezier(.4, 0, .2, 1);
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      body {
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        background: var(--bg-page);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding-top: 60px
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px
      }

      ::-webkit-scrollbar-track {
        background: transparent
      }

      ::-webkit-scrollbar-thumb {
        background: #C8C6C4;
        border-radius: 4px
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #A19F9D
      }

      /* ── Form elements ── */
      input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: #E1DFDD;
        outline: none;
        cursor: pointer
      }

      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: var(--c-blue);
        border: 2.5px solid #fff;
        box-shadow: 0 1px 6px rgba(0, 164, 239, .5);
        cursor: pointer;
        transition: transform .15s, box-shadow .15s
      }

      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        box-shadow: 0 2px 10px rgba(0, 164, 239, .6)
      }

      input[type=number],
      input[type=text],
      select {
        font-family: inherit;
        font-size: 13px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 6px 10px;
        background: #fff;
        outline: none;
        width: 100%;
        color: var(--text-primary);
        transition: var(--transition);
        height: 34px
      }

      input[type=number]:focus,
      input[type=text]:focus,
      select:focus {
        border-color: var(--c-blue);
        box-shadow: 0 0 0 3px rgba(0, 164, 239, .12)
      }

      input[type=number]:hover,
      input[type=text]:hover,
      select:hover {
        border-color: #B0ADAB
      }

      button {
        font-family: inherit;
        cursor: pointer
      }

      /* ── Top color bar ── */
      /* ── Canonical chrome bar (fixed top) ── */
      .hub-topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        z-index: 50;
        background: linear-gradient(to right, #F25022 0%, #F25022 25%, #7FBA00 25%, #7FBA00 50%, #FFB900 50%, #FFB900 75%, #00A4EF 75%, #00A4EF 100%)
      }

      .deck-chrome {
        position: fixed;
        top: 4px;
        left: 0;
        right: 0;
        z-index: 49;
        height: 56px;
        background: #FFFFFF;
        border-bottom: 1px solid var(--border);
        backdrop-filter: saturate(160%) blur(10px);
        -webkit-backdrop-filter: saturate(160%) blur(10px);
        display: flex;
        align-items: center;
        padding: 0 28px;
        gap: 14px
      }

      .deck-chrome>.deck-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0
      }

      .deck-chrome__logo {
        width: 22px;
        height: 22px;
        flex-shrink: 0
      }

      .deck-chrome__text {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis
      }

      .deck-chrome__text strong {
        color: var(--text-primary);
        font-weight: 600
      }

      .deck-chrome__sep {
        flex: 1
      }

      .deck-chrome__lang {
        display: inline-flex;
        gap: 2px;
        padding: 3px;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--bg-card)
      }

      .deck-chrome__lang-btn {
        background: none;
        border: none;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 5px 9px;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.15s
      }

      .deck-chrome__lang-btn:hover {
        color: var(--text-primary)
      }

      .deck-chrome__lang-btn[aria-current="true"] {
        background: var(--text-primary);
        color: #FFFFFF
      }

      @media (max-width:760px) {
        .deck-chrome {
          padding: 0 14px
        }

        .deck-chrome__text {
          display: none
        }
      }

      /* legacy topbar kept for backward compat (now hidden, hub-topbar replaces) */
      .topbar {
        display: none
      }

      /* ── App shell: sidebar + main grid ── */
      .app-shell {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 0;
        min-height: calc(100vh - 60px);
        max-width: 1600px;
        margin: 0 auto
      }

      @media(max-width:960px) {
        .app-shell {
          grid-template-columns: 1fr
        }
      }

      /* ── Sidebar nav ── */
      .app-sidebar {
        position: sticky;
        top: 60px;
        align-self: start;
        height: calc(100vh - 60px);
        overflow-y: auto;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        padding: 28px 0 28px;
        display: flex;
        flex-direction: column;
        gap: 6px
      }

      @media(max-width:960px) {
        .app-sidebar {
          position: static;
          height: auto;
          border-right: none;
          border-bottom: 1px solid var(--border);
          padding: 14px 0;
          flex-direction: row;
          overflow-x: auto
        }
      }

      .sidebar-eyebrow {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 0 24px 8px;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--border)
      }

      @media(max-width:960px) {
        .sidebar-eyebrow {
          display: none
        }
      }

      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 24px;
        font-family: var(--font-sans);
        font-size: 13.5px;
        font-weight: 500;
        color: var(--text-secondary);
        background: none;
        border: none;
        border-left: 3px solid transparent;
        cursor: pointer;
        text-align: left;
        transition: color .15s, background .15s, border-color .15s;
        letter-spacing: -0.005em;
        width: 100%
      }

      .sidebar-link:hover {
        color: var(--text-primary);
        background: var(--bg-page)
      }

      .sidebar-link.on {
        color: var(--c-blue);
        background: var(--c-blue-50);
        border-left-color: var(--c-blue);
        font-weight: 600
      }

      .sidebar-link__num {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        flex-shrink: 0;
        width: 18px
      }

      .sidebar-link__icon {
        display: inline-flex;
        align-items: center;
        color: var(--text-muted);
        flex-shrink: 0;
        transition: color .15s
      }

      .sidebar-link.on .sidebar-link__icon {
        color: var(--c-blue)
      }

      .sidebar-link:hover .sidebar-link__icon {
        color: var(--text-primary)
      }

      .sidebar-link.on .sidebar-link__num {
        color: var(--c-blue)
      }

      .sidebar-link__label {
        flex: 1
      }

      @media(max-width:960px) {
        .sidebar-link {
          border-left: none;
          border-bottom: 3px solid transparent;
          padding: 10px 14px;
          flex-shrink: 0;
          width: auto
        }

        .sidebar-link.on {
          border-bottom-color: var(--c-blue);
          background: none
        }
      }

      /* ── Main content area ── */
      .app-main {
        padding: 32px 40px 40px;
        min-width: 0;
        overflow-x: hidden
      }

      @media(max-width:760px) {
        .app-main {
          padding: 24px 20px
        }
      }

      /* ── Compact hero (now inside main) ── */
      .hdr {
        background: transparent;
        padding: 0 0 24px;
        color: var(--text-primary);
        border-bottom: 1px solid var(--border);
        margin-bottom: 32px
      }

      .hdr-inner {
        max-width: none;
        margin: 0;
        position: relative
      }

      .hdr-eyebrow {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 12px;
        display: inline-flex;
        align-items: center;
        gap: 10px
      }

      .hdr-eyebrow .dot-inline {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--c-blue)
      }

      .hdr-brand {
        display: none
      }

      .dots {
        display: flex;
        gap: 4px
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 2.5px
      }

      a.deck-brand {
        text-decoration: none;
        color: inherit;
        transition: opacity 0.15s
      }

      a.deck-brand:hover {
        opacity: 0.7
      }

      .hdr h1 {
        font-size: clamp(28px, 3vw, 38px);
        font-weight: 500;
        margin-bottom: 6px;
        letter-spacing: -0.025em;
        line-height: 1.1;
        color: var(--text-primary)
      }

      .hdr p {
        font-size: 15px;
        color: var(--text-secondary);
        margin-bottom: 0;
        line-height: 1.55;
        max-width: 760px
      }

      /* legacy main-tabs hidden (replaced by sidebar) */
      .main-tabs {
        display: none
      }

      .main-tab {
        display: none
      }

      /* ── Main wrap ── */
      .wrap {
        max-width: none;
        margin: 0;
        padding: 0 0 60px
      }

      /* ── Sub-tabs (pill) ── */
      .sub-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap
      }

      .sub-tab {
        padding: 7px 20px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 100px;
        border: 1.5px solid var(--border);
        background: #fff;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition)
      }

      .sub-tab.on {
        background: var(--text-primary);
        color: #fff;
        border-color: var(--text-primary);
        box-shadow: none
      }

      .sub-tab:hover:not(.on) {
        background: var(--bg-page);
        color: var(--text-primary);
        border-color: var(--border-2)
      }

      /* ── Hero band ── */
      .hero-band {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 4px solid var(--c-blue);
        border-radius: var(--radius-md);
        padding: 24px 32px;
        color: var(--text-primary);
        margin-bottom: 20px;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
      }

      .hb-inner {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0;
        margin-top: 6px
      }

      @media(max-width:800px) {
        .hb-inner {
          grid-template-columns: 1fr 1fr
        }
      }

      .hb-cell {
        text-align: left;
        padding: 10px 16px;
        border-right: 1px solid var(--border);
      }

      .hb-cell:first-child {
        padding-left: 0
      }

      .hb-cell:last-child {
        border-right: none
      }

      .hb-lbl {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 6px;
        font-weight: 500
      }

      .hb-val {
        font-size: 30px;
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.025em;
        color: var(--text-primary)
      }

      .hb-val .u {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0;
        color: var(--text-muted)
      }

      .hb-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
        line-height: 1.4
      }

      .hb-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border)
      }

      .hb-title {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-muted)
      }

      .r-badge {
        font-size: 11px;
        font-weight: 700;
        border-radius: 100px;
        padding: 4px 14px;
        letter-spacing: .02em
      }

      /* ── KPI grid ── */
      .ov-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 20px
      }

      @media(max-width:1000px) {
        .ov-grid {
          grid-template-columns: 1fr 1fr
        }
      }

      @media(max-width:600px) {
        .ov-grid {
          grid-template-columns: 1fr
        }
      }

      /* ── Stat cards ── */
      .stat-card {
        background: #fff;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 22px 24px;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
        transition: transform .2s cubic-bezier(.4, 0, .2, 1), box-shadow .2s;
      }

      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md)
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3.5px;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0
      }

      .stat-card.c-blue::before {
        background: var(--c-blue)
      }

      .stat-card.c-green::before {
        background: var(--c-green)
      }

      .stat-card.c-yellow::before {
        background: var(--c-yellow)
      }

      .stat-card.c-red::before {
        background: var(--c-red)
      }

      .stat-card.c-purple::before {
        background: var(--c-purple)
      }

      .stat-card.c-teal::before {
        background: var(--c-teal)
      }

      .stat-lbl {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .7px;
        color: var(--text-muted);
        margin-bottom: 10px
      }

      .stat-num {
        font-size: 40px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -1.5px;
        margin-bottom: 5px
      }

      .stat-card.c-blue .stat-num {
        color: var(--c-blue-700)
      }

      .stat-card.c-green .stat-num {
        color: var(--c-green-700)
      }

      .stat-card.c-yellow .stat-num {
        color: var(--c-yellow-700)
      }

      .stat-card.c-red .stat-num {
        color: var(--c-red-700)
      }

      .stat-card.c-purple .stat-num {
        color: #6B3FA0
      }

      .stat-card.c-teal .stat-num {
        color: #006B5A
      }

      .stat-sub {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.45
      }

      .stat-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        border-radius: 100px;
        padding: 2px 9px;
        margin-top: 7px
      }

      /* ── Cards ── */
      .card {
        background: #fff;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 22px 26px;
        margin-bottom: 18px;
        box-shadow: var(--shadow-sm);
      }

      .card h3 {
        font-size: 14.5px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 4px;
        letter-spacing: -.1px
      }

      .sec-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
        line-height: 1.55
      }

      .sec-hdr {
        font-size: 14.5px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 4px
      }

      .card h4 {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: .5px;
        margin-bottom: 10px;
        margin-top: 16px
      }

      /* ── Bars ── */
      .bar-row {
        margin-bottom: 12px
      }

      .bar-row:last-child {
        margin-bottom: 0
      }

      .bar-hd {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 5px
      }

      .bar-lbl {
        font-size: 12.5px;
        color: var(--text-secondary)
      }

      .bar-pct {
        font-size: 10px;
        color: var(--text-subtle);
        margin-left: 4px
      }

      .bar-val {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-primary)
      }

      .bar-track {
        height: 8px;
        background: #F0EFEE;
        border-radius: 4px;
        overflow: hidden
      }

      .bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width .5s cubic-bezier(.4, 0, .2, 1)
      }

      /* ── Two-col layout ── */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: start
      }

      @media(max-width:900px) {
        .two-col {
          grid-template-columns: 1fr
        }
      }

      /* ── Tables ── */
      .tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px
      }

      .tbl thead {
        position: sticky;
        top: 0;
        z-index: 1
      }

      .tbl th {
        text-align: left;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .55px;
        color: var(--text-muted);
        padding: 9px 12px 7px;
        border-bottom: 2px solid var(--border);
        background: #FAFAF9;
        white-space: nowrap
      }

      .tbl td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border-light);
        color: var(--text-secondary);
        vertical-align: middle;
        line-height: 1.4
      }

      .tbl tbody tr:hover td {
        background: #F5F9FE
      }

      .tbl tr:last-child td {
        border-bottom: none
      }

      .tbl tr.hi td {
        background: #EFF6FC
      }

      .tbl .g {
        color: var(--c-green);
        font-weight: 700
      }

      .tbl .m {
        color: var(--text-muted)
      }

      .tbl .b {
        color: var(--c-blue);
        font-weight: 700
      }

      /* ── Notes ── */
      .note {
        font-size: 11.5px;
        color: var(--text-secondary);
        line-height: 1.55;
        padding: 10px 14px;
        background: #FAF9F8;
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--border)
      }

      .note.warn {
        border-left-color: var(--c-yellow);
        background: #FFFBF0
      }

      .note.err {
        border-left-color: var(--c-red);
        background: #FDF3F4
      }

      .note.info {
        border-left-color: var(--c-blue);
        background: #EFF6FC
      }

      /* ── Pills ── */
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px
      }

      .pill {
        font-size: 11.5px;
        color: var(--text-secondary);
        background: #F3F2F1;
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 4px 12px;
        transition: var(--transition)
      }

      .pill strong {
        color: var(--text-primary);
        font-weight: 700
      }

      .pill:hover {
        background: #EFF6FC;
        border-color: #C7E0F4;
        color: var(--c-blue)
      }

      /* ── Presets ── */
      .preset-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 16px
      }

      .preset-btn {
        padding: 6px 15px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 100px;
        border: 1.5px solid var(--border);
        background: #F8F7F6;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
        font-family: inherit
      }

      .preset-btn:hover {
        border-color: var(--c-blue);
        background: #EFF6FC;
        color: var(--c-blue)
      }

      .preset-btn.on {
        background: var(--c-blue);
        border-color: var(--c-blue);
        color: #fff;
        box-shadow: 0 2px 8px rgba(0, 164, 239, .2)
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: var(--border-light);
        margin: 14px 0
      }

      /* ── Label ── */
      .lbl {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .5px;
        color: var(--text-muted);
        margin-bottom: 7px
      }

      /* ── Scenario cards ── */
      .sc-strip {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px
      }

      @media(max-width:700px) {
        .sc-strip {
          grid-template-columns: 1fr
        }
      }

      .sc {
        border-radius: var(--radius-md);
        border: 1.5px solid;
        padding: 16px 18px
      }

      .sc.best {
        border-color: #9FD99F;
        background: #F1FAF1
      }

      .sc.exp {
        border-color: #C7E0F4;
        background: #EFF6FC;
        box-shadow: 0 0 0 2px rgba(0, 164, 239, .12)
      }

      .sc.worst {
        border-color: var(--border);
        background: #FAF9F8
      }

      .sc-tag {
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .6px;
        margin-bottom: 5px
      }

      .sc.best .sc-tag {
        color: var(--c-green)
      }

      .sc.exp .sc-tag {
        color: var(--c-blue)
      }

      .sc.worst .sc-tag {
        color: var(--text-muted)
      }

      .sc-roi {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 2px;
        letter-spacing: -.5px
      }

      .sc.best .sc-roi {
        color: var(--c-green)
      }

      .sc.exp .sc-roi {
        color: var(--c-blue)
      }

      .sc.worst .sc-roi {
        color: var(--text-secondary)
      }

      .sc-data {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.65
      }

      /* ── Sliders ── */
      .sldr {
        margin-bottom: 14px
      }

      .sldr:last-child {
        margin-bottom: 0
      }

      .sldr-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px
      }

      .sldr-lbl {
        font-size: 12.5px;
        color: var(--text-secondary);
        font-weight: 500
      }

      .sldr-val {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-primary);
        background: #F3F2F1;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 9px;
        min-width: 76px;
        text-align: right
      }

      .sldr-ends {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--text-subtle);
        margin-top: 4px
      }

      /* ── Persona grid ── */
      .persona-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 9px;
        margin-bottom: 18px
      }

      @media(max-width:1000px) {
        .persona-grid {
          grid-template-columns: repeat(4, 1fr)
        }
      }

      @media(max-width:700px) {
        .persona-grid {
          grid-template-columns: repeat(3, 1fr)
        }
      }

      .persona-btn {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        grid-template-rows: auto auto;
        align-items: center;
        column-gap: 10px;
        row-gap: 2px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-md);
        padding: 11px 12px;
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        background: #fff;
        transition: var(--transition)
      }

      .persona-btn:hover {
        border-color: var(--c-blue);
        background: #EFF6FC;
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm)
      }

      .persona-btn.on {
        border-color: var(--c-blue);
        background: #EFF6FC;
        box-shadow: 0 0 0 2px rgba(0, 164, 239, .2)
      }

      .persona-icon {
        grid-column: 1;
        grid-row: 1 / 3;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: var(--bg-page);
        flex-shrink: 0
      }

      .persona-name {
        grid-column: 2;
        grid-row: 1;
        font-size: 11px;
        font-weight: 600;
        color: #323130;
        line-height: 1.25
      }

      .persona-wave {
        grid-column: 2;
        grid-row: 2;
        font-size: 9.5px;
        color: var(--text-muted);
        line-height: 1.2
      }

      /* ── Gartner cards ── */
      .gartner-card {
        background: #fff;
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 20px 22px;
        margin-bottom: 16px;
        border-left: 4px solid var(--c-orange);
        box-shadow: var(--shadow-sm);
      }

      .gartner-card h3 {
        color: var(--c-orange);
        margin-bottom: 8px;
        font-size: 13.5px;
        font-weight: 700
      }

      .gartner-card .src {
        font-size: 10px;
        color: var(--text-subtle);
        margin-top: 8px;
        font-weight: 600;
        letter-spacing: .02em
      }

      /* ── Insight cards ── */
      .insight-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        margin-bottom: 20px
      }

      @media(max-width:800px) {
        .insight-grid {
          grid-template-columns: 1fr
        }
      }

      .insight-card {
        border-radius: var(--radius-lg);
        padding: 20px;
        text-align: center;
        border: 1.5px solid;
        transition: var(--transition)
      }

      .insight-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md)
      }

      .insight-card .ic-num {
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 5px;
        letter-spacing: -1px
      }

      .insight-card .ic-lbl {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 3px
      }

      .insight-card .ic-sub {
        font-size: 10.5px;
        color: var(--text-muted)
      }

      /* ── BCP (Defend/Extend/Upend) ── */
      .bcp-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
        margin-bottom: 20px
      }

      @media(max-width:700px) {
        .bcp-grid {
          grid-template-columns: 1fr
        }
      }

      .bcp-card {
        border-radius: var(--radius-lg);
        padding: 18px;
        border: 1.5px solid;
        text-align: center;
        transition: var(--transition)
      }

      .bcp-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md)
      }

      .bcp-tag {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .5px;
        margin-bottom: 8px
      }

      .bcp-desc {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.55;
        margin-bottom: 10px
      }

      .bcp-metric {
        font-size: 11.5px;
        font-weight: 700;
        margin-bottom: 4px
      }

      /* ── Terminal ── */
      .term {
        background: #0D1117;
        border-radius: var(--radius-lg);
        padding: 18px 20px;
        color: #fff;
        box-shadow: var(--shadow-md)
      }

      .term-hdr {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 12px
      }

      .term-dots {
        display: flex;
        gap: 5px
      }

      .term-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%
      }

      .term-title {
        font-size: 10.5px;
        color: rgba(255, 255, 255, .28);
        font-weight: 500
      }

      .mono {
        font-family: "Cascadia Code", "JetBrains Mono", "Consolas", "Courier New", monospace;
        font-size: 11.5px;
        line-height: 2;
        color: #8B949E
      }

      .mono .acc {
        color: #58A6FF;
        font-weight: 600
      }

      .mono .grn {
        color: #3FB950
      }

      .mono .yel {
        color: #D29922;
        font-weight: 700
      }

      .mono .wht {
        color: #E6EDF3
      }

      .mono .dim {
        color: #30363D
      }

      .mono .sep {
        color: #21262D;
        display: block
      }

      /* ── Footer ── */
      /* ── Canonical closing footer ── */
      .footer {
        background: #141414;
        color: #F0F0F0;
        padding: 80px 28px 56px;
        border-top: none
      }

      .footer-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px
      }

      .footer-brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #C7C7C2;
        margin-bottom: 6px
      }

      .footer-brand img {
        width: 22px;
        height: 22px
      }

      .footer-brand .footer-brand__div {
        color: #3A3A36
      }

      .footer-title {
        font-size: clamp(28px, 3.4vw, 44px);
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: #F0F0F0;
        margin: 0;
        max-width: 880px
      }

      .footer-sub {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #A8A8A4;
        margin: 0 0 18px
      }

      .footer-cta {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin: 12px 0 32px
      }

      .footer-btn {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(240, 240, 240, 0.18);
        border-radius: 8px;
        color: #F0F0F0;
        text-decoration: none;
        transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
        min-width: 240px
      }

      .footer-btn:hover {
        border-color: rgba(240, 240, 240, 0.36);
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-1px)
      }

      .footer-btn--primary {
        background: rgba(0, 164, 239, 0.12);
        border-color: rgba(0, 164, 239, 0.42)
      }

      .footer-btn--primary:hover {
        background: rgba(0, 164, 239, 0.22);
        border-color: rgba(0, 164, 239, 0.7)
      }

      .footer-btn svg {
        color: currentColor;
        flex-shrink: 0;
        width: 20px;
        height: 20px
      }

      .footer-btn-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
        text-align: left
      }

      .footer-btn-kicker {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #A8A8A4
      }

      .footer-btn-value {
        font-size: 14px;
        font-weight: 500;
        color: #F0F0F0;
        letter-spacing: -0.005em
      }

      .footer-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #A8A8A4;
        border-top: 1px solid #2E2E2A;
        padding-top: 18px;
        width: 100%;
        justify-content: space-between
      }

      .footer-license {
        margin: 12px 0 0;
        font-size: 12px;
        color: #A8A8A4
      }

      @media (max-width:720px) {
        .footer-btn {
          min-width: 100%
        }

        .footer-meta {
          flex-direction: column;
          gap: 8px
        }
      }

      .reset-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        background: #FAF9F8;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 5px 12px;
        cursor: pointer;
        font-family: inherit;
        transition: var(--transition)
      }

      .reset-btn:hover {
        background: #EFF6FC;
        border-color: var(--c-blue);
        color: var(--c-blue)
      }

      /* ── Wave timeline ── */
      .wave-timeline {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        overflow-x: auto
      }

      .wave-item {
        flex: 1;
        min-width: 150px;
        padding: 16px 18px;
        text-align: center;
        position: relative
      }

      .wave-item::after {
        content: "";
        position: absolute;
        top: 50%;
        right: 0;
        width: 1px;
        height: 55%;
        transform: translateY(-50%);
        background: var(--border-light)
      }

      .wave-item:last-child::after {
        display: none
      }

      .wave-num {
        font-size: 30px;
        font-weight: 800;
        margin-bottom: 5px;
        letter-spacing: -1px
      }

      .wave-name {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 2px
      }

      .wave-time {
        font-size: 10.5px;
        color: var(--text-muted)
      }

      .wave-profiles {
        font-size: 10.5px;
        color: var(--text-secondary);
        margin-top: 6px;
        line-height: 1.45
      }

      /* ── Callouts ── */
      .callout {
        border-radius: var(--radius-md);
        padding: 14px 18px;
        margin-bottom: 16px;
        display: flex;
        gap: 14px;
        align-items: flex-start;
        border: 1px solid
      }

      .callout-icon {
        font-size: 22px;
        flex-shrink: 0;
        margin-top: 1px
      }

      .callout-text {
        flex: 1
      }

      .callout-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px
      }

      .callout-body {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.6
      }

      .callout.gartner {
        background: #FFF8F0;
        border-color: #F0D4A8
      }

      .callout.warning {
        background: #FFFBF0;
        border-color: #FFD875
      }

      .callout.critical {
        background: #FDF3F4;
        border-color: #F1A7A9
      }


      /* ── UX improvements: focus-visible, smooth interactions ── */
      *:focus-visible {
        outline: 2px solid var(--c-blue);
        outline-offset: 2px;
        border-radius: 3px
      }

      button:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--c-blue);
        outline-offset: 2px
      }

      .main-tab,
      .sub-tab,
      .deck-chrome__lang-btn {
        transition: color .15s ease, background .15s ease, border-color .15s ease
      }

      .stat-card,
      .hero-band {
        transition: transform .18s cubic-bezier(.4, 0, .2, 1), box-shadow .18s, border-color .15s
      }

      .hero-band:hover {
        box-shadow: var(--shadow-md);
        border-color: var(--border-2)
      }

      input[type=range] {
        accent-color: var(--c-blue)
      }

      @media(prefers-reduced-motion:reduce) {

        *,
        *::before,
        *::after {
          animation-duration: .01ms !important;
          transition-duration: .01ms !important
        }
      }

      .ubb-btn {
        font: 600 12px Inter, sans-serif;
        padding: 7px 12px;
        border: 1px solid #DDD9D2;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        color: #1A1A1A
      }

      .ubb-btn:hover {
        border-color: #0078D4;
        color: #0076AC
      }
    </style>
  </head>

    <div class="hub-topbar" aria-hidden="true"></div>
    <div class="deck-chrome">
      <a class="deck-brand" href="../index.html" data-action="home" aria-label="Back to Knowledge Hub"
        title="Back to Knowledge Hub">
        <svg width="20" height="20" class="deck-chrome__logo" viewBox="0 0 17 17" xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true">
          <rect x="0" y="0" width="8" height="8" fill="#F25022" />
          <rect x="9" y="0" width="8" height="8" fill="#7FBA00" />
          <rect x="0" y="9" width="8" height="8" fill="#00A4EF" />
          <rect x="9" y="9" width="8" height="8" fill="#FFB900" />
        </svg>
        <span class="deck-chrome__text"><strong data-i18n="brandWho">Paula Silva</strong> | <span
            data-i18n="brandRole">Software Global Black Belt</span> &middot; <span data-i18n="brandTopic">Agentic AI ROI
            Toolkit</span></span>
      </a>
      <div class="deck-chrome__sep"></div>
      <div class="deck-chrome__lang" role="group" aria-label="Language">
        <button class="deck-chrome__lang-btn" data-locale="en" aria-current="true" onclick="setLocale('en')">EN</button>
        <button class="deck-chrome__lang-btn" data-locale="pt-BR" onclick="setLocale('pt-BR')">PT</button>
        <button class="deck-chrome__lang-btn" data-locale="es" onclick="setLocale('es')">ES</button>
      </div>
    </div>

        style="position:fixed;top:60px;left:18px;z-index:9999;font-family:Inter,sans-serif;font-size:13px;color:#737373;max-width:300px;background:#FFF7E0;padding:10px 14px;border:1px solid #FFB900;border-radius:4px;">
        JavaScript is required for the interactive ROI calculator. <a href="../index.html">Return to the Knowledge
          Hub</a>.</p>
    </noscript>
    <script src="i18n.js?v=0f729592f8"></script>
    <script>
      // Dictionary lives in i18n.js (window.I18N_STRINGS). Author Software Global Black Belt, paulasilva@microsoft.com
      const I18N = window.I18N_STRINGS || { en: {}, 'pt-BR': {}, es: {} };
      function setLocale(loc) {
        const dict = I18N[loc] || I18N.en;
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const k = el.getAttribute('data-i18n');
          if (dict[k]) el.textContent = dict[k];
        });
        document.documentElement.setAttribute('lang', loc);
        /* Update language switcher button states */
        document.querySelectorAll('.deck-chrome__lang-btn').forEach(b => {
          if (b.dataset.locale === loc) b.setAttribute('aria-current', 'true');
          else b.removeAttribute('aria-current');
        });
        try { localStorage.setItem('roi-locale', loc); } catch (_) { }
        try { window.dispatchEvent(new CustomEvent('localechange', { detail: loc })); } catch (_) { }
      }
      (function () {
        var s = null; try { s = localStorage.getItem('roi-locale'); } catch (_) { }
        var n = (navigator.language || 'en').toLowerCase();
        setLocale(s || (n.indexOf('pt') === 0 ? 'pt-BR' : n.indexOf('es') === 0 ? 'es' : 'en'));
      })();
    </script>
    <div id="root"></div>

    <script src="dist/app.js?v=0f729592f8"></script>
